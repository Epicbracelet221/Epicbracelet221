name: Daily Contribution Bot

on:
  schedule:
    # Runs at 14:15 UTC (adjust the numbers to change the time)
    - cron: '15 14 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  make-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to push code to the repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Log File
        run: |
          echo "Contribution updated on: $(date)" >> daily_log.txt

      - name: Commit and Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          git add daily_log.txt
          git commit -m "chore: automated daily update $(date +'%Y-%m-%d')"
          git push
